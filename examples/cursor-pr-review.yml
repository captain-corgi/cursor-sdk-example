# Cursor SDK PR Review — example workflow
#
# This repo publishes a composite GitHub Action (`action.yml` at the repo root).
# Point `uses:` at this repository (semver tag or SHA) instead of copying `src/`.
#
#   - uses: YOUR_ORG/cursor-sdk-example@v0 # replace with release tag / branch / SHA
#
# Prerequisites:
#   1. GitHub Secrets: CURSOR_API_KEY (required), LINEAR_API_KEY (optional).
#   2. Optional repo variable LINEAR_TEAM_ID when using Linear.
#   3. Optional: cursor-runtime input "cloud" if the Cursor GitHub App is
#      installed — see USAGE.md.
#
# Heads up — forks and Dependabot:
#   GitHub does NOT pass CURSOR_API_KEY for public-fork pull_request runs or for
#   Dependabot-triggered runs. The bundled job is skipped (if: secret non-empty)
#   so those PRs don't fail the check. Human same-repo PRs with the secret run
#   Cursor review. Naive pull_request_target remains unsafe — see USAGE.md FAQ.
#
name: Cursor PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: cursor-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ secrets.CURSOR_API_KEY != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Cursor PR Review
        uses: YOUR_ORG/cursor-sdk-example@v0
        # Pin a commit SHA instead of @v0 for reproducible installs, e.g.:
        # uses: YOUR_ORG/cursor-sdk-example@abcd1234...
        with:
          cursor-api-key: ${{ secrets.CURSOR_API_KEY }}
          github-token: ${{ github.token }}
          linear-api-key: ${{ secrets.LINEAR_API_KEY }}
          linear-team-id: ${{ vars.LINEAR_TEAM_ID }}
          cursor-runtime: local
