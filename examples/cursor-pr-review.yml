# Cursor SDK PR Review — example workflow
#
# This repo publishes a composite GitHub Action (`action.yml` at the repo root).
# Point `uses:` at this repository (semver tag or SHA) instead of copying `src/`.
#
#   - uses: YOUR_ORG/cursor-sdk-example@v0 # replace with release tag / branch / SHA
#
# Prerequisites:
#   1. GitHub Secrets: CURSOR_API_KEY (required), LINEAR_API_KEY (optional).
#   2. Optional repo variable LINEAR_TEAM_ID when using Linear.
#   3. Optional: cursor-runtime input "cloud" if the Cursor GitHub App is
#      installed — see USAGE.md.
#
# Heads up — PRs from public forks:
#   GitHub does NOT pass repository secrets (including CURSOR_API_KEY) to
#   `pull_request` workflow runs triggered by a public fork, so fork PRs will
#   fail at the action step with a missing-secret error. This workflow only
#   reliably runs for PRs whose head branch lives in the same repo. See
#   examples/README.md and USAGE.md (FAQ) before switching to pull_request_target.
#
name: Cursor PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: cursor-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Cursor PR Review
        uses: YOUR_ORG/cursor-sdk-example@v0
        # Pin a commit SHA instead of @v0 for reproducible installs, e.g.:
        # uses: YOUR_ORG/cursor-sdk-example@abcd1234...
        with:
          cursor-api-key: ${{ secrets.CURSOR_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          linear-api-key: ${{ secrets.LINEAR_API_KEY }}
          linear-team-id: ${{ vars.LINEAR_TEAM_ID }}
          cursor-runtime: local
